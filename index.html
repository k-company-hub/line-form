<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込みフォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; }
    input, select { width: 100%; padding: 10px; margin: 8px 0 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
    button { width: 100%; padding: 12px; background: #06C755; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    label { font-weight: bold; }
    .checkbox-group { margin: 8px 0 16px; }
    .checkbox-group label { font-weight: normal; display: block; margin: 6px 0; }
    .error-msg { color: red; font-size: 14px; margin: -10px 0 10px; display: none; }
    #successMsg { display: none; text-align: center; padding: 60px 20px; }
    #successMsg p { font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <h2 id="formTitle">お申し込みフォーム</h2>

  <div id="formArea">
    <label>① お名前</label>
    <input type="text" id="name" placeholder="山田 太郎">
    <p class="error-msg" id="nameError">お名前を入力してください</p>

    <label>② 電話番号</label>
    <input type="tel" id="phone" placeholder="090-0000-0000">
    <p class="error-msg" id="phoneError">電話番号を入力してください</p>

    <label>③ 居住エリア</label>
    <select id="area">
      <option value="">選択してください</option>
      <option value="福岡市東区">福岡市東区</option>
      <option value="福岡市博多区">福岡市博多区</option>
      <option value="福岡市中央区">福岡市中央区</option>
      <option value="福岡市南区">福岡市南区</option>
      <option value="福岡市西区">福岡市西区</option>
      <option value="福岡市城南区">福岡市城南区</option>
      <option value="福岡市早良区">福岡市早良区</option>
      <option value="筑紫地区">筑紫地区</option>
      <option value="朝倉地区">朝倉地区</option>
      <option value="筑後地区">筑後地区</option>
      <option value="筑後地区">その他</option>
    </select>
    <p class="error-msg" id="areaError">居住エリアを選択してください</p>

    <label>④ 悩み（複数選択可）</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="移動"> 移動</label>
      <label><input type="checkbox" value="入浴"> 入浴</label>
      <label><input type="checkbox" value="排泄"> 排泄</label>
      <label><input type="checkbox" value="睡眠"> 睡眠</label>
      <label><input type="checkbox" value="その他"> その他</label>
    </div>
    <p class="error-msg" id="worryError">悩みを選択してください</p>

    <label>⑤ 希望</label>
    <select id="hope">
      <option value="">選択してください</option>
      <option value="相談">相談</option>
      <option value="レンタル">レンタル</option>
      <option value="購入">購入</option>
    </select>
    <p class="error-msg" id="hopeError">希望を選択してください</p>

    <button onclick="submitForm()">送信する</button>
  </div>

  <div id="successMsg">
    <p>送信が完了しました</p>
  </div>

  <script>
    let lineUserId = "";

    liff.init({ liffId: "2009977292-OfXHlYpV" })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          liff.getProfile().then(profile => {
            lineUserId = profile.userId;
          });
        }
      })
      .catch((err) => {
        document.body.innerHTML = "<p style='color:red;padding:20px;'>エラーが発生しました：" + err.message + "</p>";
      });

    async function submitForm() {
      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;
      const area = document.getElementById("area").value;
      const hope = document.getElementById("hope").value;
      const checkedWorries = Array.from(
        document.querySelectorAll(".checkbox-group input:checked")
      ).map(cb => cb.value).join("・");

      let hasError = false;

      document.querySelectorAll(".error-msg").forEach(el => el.style.display = "none");

      if (!name) { document.getElementById("nameError").style.display = "block"; hasError = true; }
      if (!phone) { document.getElementById("phoneError").style.display = "block"; hasError = true; }
      if (!area) { document.getElementById("areaError").style.display = "block"; hasError = true; }
      if (!checkedWorries) { document.getElementById("worryError").style.display = "block"; hasError = true; }
      if (!hope) { document.getElementById("hopeError").style.display = "block"; hasError = true; }

      if (hasError) return;

      const payload = {
        lineUserId: lineUserId,
        name: name,
        phone: phone,
        area: area,
        worry: checkedWorries,
        hope: hope
      };

      await fetch("https://script.google.com/macros/s/AKfycbxWdbkMaek3ByD4cbVrKGJQBsVWyltgPmDIdpGhJOjxyV9VvcmWJgJnhTZhzq00WyL9/exec", {
        method: "POST",
        body: JSON.stringify(payload)
      });

      document.getElementById("formArea").style.display = "none";
      document.getElementById("formTitle").style.display = "none";
      document.getElementById("successMsg").style.display = "block";
      setTimeout(() => liff.closeWindow(), 2000);
    }
  </script>
</body>
</html>
